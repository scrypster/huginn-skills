name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "registry/**"
      - "content/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  S3_BUCKET: skills.huginncloud.com
  CF_DISTRIBUTION: E2S19O8UHVW39N

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate registry
        run: python scripts/validate.py

      - name: Build index
        run: python scripts/build_index.py

      - name: Copy content to dist
        run: cp -r content dist/content

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::504262955777:role/huginncloud-skills-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=300" \
            --exclude "*.json"

          # JSON files get shorter TTL for fresher index
          aws s3 sync dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=60" \
            --include "*.json" \
            --exclude "*"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION }} \
            --paths "/*"
