description: A cohesive workflow system for disciplined AI-assisted development
long_description: |
  Superpowers is a collection of 14 interlocking skills that enforce structured,
  disciplined development workflows. Skills cover the full dev lifecycle: brainstorming
  → planning → TDD implementation → code review → debugging → branch completion.
  They are designed to work as a system — install using-superpowers as your entry point
  and the others become available as needed.
