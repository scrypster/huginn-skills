id: obra/writing-plans
name: writing-plans
display_name: Writing Plans
author: obra
description: Write comprehensive implementation plans — bite-sized tasks with exact paths and commands
long_description: |
  Creates detailed implementation plans assuming zero codebase context. Each task includes
  exact file paths, complete code snippets (not "add validation"), exact commands with
  expected output, and TDD steps. Plans are saved to docs/ and reviewed by a plan-document
  reviewer subagent before handoff to execution. Part of the Superpowers collection.
