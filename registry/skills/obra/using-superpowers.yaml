long_description: |
  The meta-skill that governs the entire Superpowers collection. Establishes the rule:
  check for applicable skills before any response, including clarifying questions. Defines
  skill priority (process skills first, implementation skills second) and prevents common
  rationalizations for skipping the workflow. Install this to unlock the full collection.
  Part of the Superpowers collection.
