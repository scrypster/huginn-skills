id: obra/test-driven-development
name: test-driven-development
display_name: Test-Driven Development
author: obra
description: Write failing test first, then minimal implementation — strict red-green-refactor
long_description: |
  Enforces the TDD discipline: write a failing test, confirm it fails, write the minimal
  implementation to make it pass, confirm it passes, then refactor. Never writes
  implementation before a test. Keeps implementation minimal — no speculative features.
  Part of the Superpowers collection.
