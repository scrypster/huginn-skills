id: obra/dispatching-parallel-agents
name: dispatching-parallel-agents
display_name: Dispatching Parallel Agents
author: obra
description: Investigate multiple independent failures simultaneously with focused agents
long_description: |
  When facing 3+ independent failures across different subsystems, dispatches one focused
  agent per domain rather than investigating sequentially. Each agent gets a narrow scope,
  specific error context, and clear output requirements. Agents run concurrently, then
  results are integrated and conflicts checked. Part of the Superpowers collection.
