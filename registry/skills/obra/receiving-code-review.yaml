author: obra
description: Handle code review feedback with technical rigor — verify before implementing
long_description: |
  When receiving code review comments, applies technical rigor before acting: reads feedback
  carefully, verifies claims, pushes back respectfully on incorrect suggestions, and
  implements only valid feedback. Prevents blind acceptance of review comments that
  introduce bugs or regressions. Part of the Superpowers collection.
