id: obra/systematic-debugging
name: systematic-debugging
display_name: Systematic Debugging
author: obra
description: Root-cause-first debugging discipline — never fix symptoms, always find cause
long_description: |
  Enforces four strict phases: root cause investigation (evidence gathering, reproduction,
  data flow tracing), pattern analysis (find working examples, identify differences),
  hypothesis testing (one change at a time), and implementation (failing test first).
  If 3+ fixes fail, questions the architecture rather than trying again.
  Part of the Superpowers collection.
