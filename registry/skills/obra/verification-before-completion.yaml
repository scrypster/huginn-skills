id: obra/verification-before-completion
name: verification-before-completion
display_name: Verification Before Completion
author: obra
description: Verify work before claiming success — evidence before assertions, always
long_description: |
  Before claiming a task is complete, fixed, or passing: run the verification commands,
  read the actual output, confirm it matches the expected result. Prevents the common
  failure mode of claiming success without checking. "Tests passing" means you ran them
  and read the output — not that you think they should pass.
  Part of the Superpowers collection.
