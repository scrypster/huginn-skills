author: obra
description: Execute implementation plans in batches with human review checkpoints
long_description: |
  Works through a written implementation plan in logical batches, pausing after each batch
  for review. Tracks progress with checkboxes, handles blockers, and ensures each batch
  leaves the codebase in a working state. Use when you want to stay in the loop between
  batches. Part of the Superpowers collection.
